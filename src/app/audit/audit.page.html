<ion-header class="ion-no-border">
  <ion-toolbar class="audit-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <div class="toolbar-title">
      <span class="title-main">Audit Log</span>
      <span class="title-sub">Activity History</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="audit-body">

    <!-- Skeleton -->
    <ng-container *ngIf="loading">
      <div class="log-card" *ngFor="let i of [1,2,3,4,5]">
        <ion-skeleton-text animated style="width:40px;height:40px;border-radius:14px;flex-shrink:0;"></ion-skeleton-text>
        <div style="flex:1;padding-left:12px">
          <ion-skeleton-text animated style="width:100px;height:13px;border-radius:6px;margin-bottom:6px;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width:160px;height:11px;border-radius:6px;margin-bottom:4px;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width:80px;height:10px;border-radius:6px;"></ion-skeleton-text>
        </div>
      </div>
    </ng-container>

    <!-- Logs -->
    <ng-container *ngIf="!loading">
      <div class="log-card" *ngFor="let log of logs">
        <div class="log-icon" [class]="actionMeta[log.action].color">
          <ion-icon [name]="actionMeta[log.action].icon"></ion-icon>
        </div>
        <div class="log-info">
          <span class="log-action">{{ actionMeta[log.action].label }}</span>
          <span class="log-donor">{{ log.donorName }}</span>
          <span class="log-details">{{ log.details }}</span>
          <div class="log-meta">
            <ion-icon name="person-outline"></ion-icon>
            <span>{{ log.performedBy }}</span>
            <ion-icon name="time-outline" style="margin-left:8px"></ion-icon>
            <span>{{ formatTime(log.timestamp) }}</span>
          </div>
        </div>
      </div>

      <p class="empty-msg" *ngIf="logs.length === 0">No audit logs yet.</p>
    </ng-container>

  </div>
</ion-content>
