<ion-app>

  <ion-menu contentId="main-content" type="overlay">
    <ion-content class="menu-content" [scrollY]="false">

      <!-- Menu Header -->
      <div class="menu-header">
        <div class="menu-avatar">
          <ion-icon name="business-outline"></ion-icon>
        </div>
        <h3>Hadaya</h3>
        <p>Community Donation Tracker</p>
      </div>

      <!-- Nav Items -->
      <div class="menu-nav">
        <a class="nav-item" routerLink="/home" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="home-outline"></ion-icon>
          </div>
          <span>Home</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/donors" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="people-outline"></ion-icon>
          </div>
          <span>Donors</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/staff" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="person-circle-outline"></ion-icon>
          </div>
          <span>Staff</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <!-- <a class="nav-item" routerLink="/charity" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="heart-outline"></ion-icon>
          </div>
          <span>Charity</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a> -->
        <a class="nav-item" routerLink="/reports" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="document-text-outline"></ion-icon>
          </div>
          <span>Reports</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/hadith" routerLinkActive="nav-active" (click)="closeMenu()">
          <div class="nav-icon-wrap">
            <ion-icon name="book-outline"></ion-icon>
          </div>
          <span>Daily Hadith</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/audit" routerLinkActive="nav-active" (click)="closeMenu()" *ngIf="auth.isLoggedIn()">
          <div class="nav-icon-wrap">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
          </div>
          <span>Audit Log</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/expenses" routerLinkActive="nav-active" (click)="closeMenu()" *ngIf="auth.isLoggedIn()">
          <div class="nav-icon-wrap">
            <ion-icon name="trending-down-outline"></ion-icon>
          </div>
          <span>Expenses</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
        <a class="nav-item" routerLink="/backup" routerLinkActive="nav-active" (click)="closeMenu()" *ngIf="auth.isLoggedIn()">
          <div class="nav-icon-wrap">
            <ion-icon name="cloud-upload-outline"></ion-icon>
          </div>
          <span>Backup & Restore</span>
          <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
        </a>
      </div>
      <div class="menu-auth">
        <ng-container *ngIf="!auth.isLoggedIn()">
          <a class="nav-item auth-item" routerLink="/login" (click)="closeMenu()">
            <div class="nav-icon-wrap login-icon">
              <ion-icon name="log-in-outline"></ion-icon>
            </div>
            <span>Login</span>
            <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
          </a>
        </ng-container>
        <ng-container *ngIf="auth.isLoggedIn()">
          <div class="logged-user">
            <ion-icon name="person-circle-outline"></ion-icon>
            <span>{{ auth.getUser()?.email }}</span>
          </div>
          <a class="nav-item auth-item logout" (click)="logout()">
            <div class="nav-icon-wrap logout-icon">
              <ion-icon name="log-out-outline"></ion-icon>
            </div>
            <span>Logout</span>
            <ion-icon name="chevron-forward-outline" class="nav-arrow"></ion-icon>
          </a>
        </ng-container>
      </div>

      <!-- Menu Footer -->
      <div class="menu-footer">
        <ion-icon name="leaf-outline"></ion-icon>
        <span>Hadaya &copy; 2025</span>
      </div>

    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
